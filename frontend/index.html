<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/etymology/">
    <title>Этимология — Cognate Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Old+Standard+TT:wght@400;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- SVG filter definitions for graph node glow effects -->
    <svg style="position:absolute;width:0;height:0" aria-hidden="true">
        <defs>
            <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
    </svg>

    <div class="container">
        <header>
            <div class="ornament ornament-top" aria-hidden="true">◆ ◈ ◆</div>
            <h1>Этимология</h1>
            <p class="subtitle">Discover shared Indo-European roots between words</p>
            <div class="ornament ornament-bottom" aria-hidden="true">◆ ◈ ◆</div>
        </header>

        <div class="scroll-panel">
            <form id="cognate-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="word-a">Word A</label>
                        <div class="input-with-lang">
                            <input type="text" id="word-a" placeholder="e.g. water" autocomplete="off" required>
                            <select id="lang-a">
                                <option value="en">EN</option>
                                <option value="ru">RU</option>
                                <option value="de">DE</option>
                                <option value="fr">FR</option>
                                <option value="es">ES</option>
                                <option value="it">IT</option>
                                <option value="pt">PT</option>
                                <option value="nl">NL</option>
                                <option value="pl">PL</option>
                                <option value="cs">CS</option>
                                <option value="la">LA</option>
                                <option value="grc">GRC</option>
                                <option value="el">EL</option>
                                <option value="hy">HY</option>
                                <option value="fa">FA</option>
                                <option value="ar">AR</option>
                            </select>
                        </div>
                        <ul class="suggestions" id="suggestions-a"></ul>
                    </div>

                    <div class="input-group">
                        <label for="word-b">Word B</label>
                        <div class="input-with-lang">
                            <input type="text" id="word-b" placeholder="e.g. вода" autocomplete="off" required>
                            <select id="lang-b">
                                <option value="ru">RU</option>
                                <option value="en">EN</option>
                                <option value="de">DE</option>
                                <option value="fr">FR</option>
                                <option value="es">ES</option>
                                <option value="it">IT</option>
                                <option value="pt">PT</option>
                                <option value="nl">NL</option>
                                <option value="pl">PL</option>
                                <option value="cs">CS</option>
                                <option value="la">LA</option>
                                <option value="grc">GRC</option>
                                <option value="el">EL</option>
                                <option value="hy">HY</option>
                                <option value="fa">FA</option>
                                <option value="ar">AR</option>
                            </select>
                        </div>
                        <ul class="suggestions" id="suggestions-b"></ul>
                    </div>

                    <button type="submit" id="check-btn">Check</button>
                </div>
            </form>
        </div>

        <div id="result" class="result hidden"></div>

        <div id="graph-container">
            <svg id="graph"></svg>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js"></script>
    <script src="graph.js"></script>
</body>
</html>
